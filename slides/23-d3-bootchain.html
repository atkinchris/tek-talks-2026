<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared/style.css">
</head>
<body>
  <div class="slide" style="align-items: flex-start;">
    <div class="slide-label">Signed bootloader chain</div>
    <h2 style="margin-bottom: 48px;">Every step checks the next.</h2>
    <div class="chain">
      <div class="chain-item">ROM</div>
      <div class="chain-arrow">-&gt;<br><span style="font-size: 22px;">verifies</span></div>
      <div class="chain-item">Bootloader</div>
      <div class="chain-arrow">-&gt;<br><span style="font-size: 22px;">verifies</span></div>
      <div class="chain-item">Kernel</div>
      <div class="chain-arrow">-&gt;<br><span style="font-size: 22px;">verifies</span></div>
      <div class="chain-item">Rootfs</div>
    </div>
    <p class="soft" style="margin-top: 48px; max-width: 1400px;">If any link in the chain fails verification, the device refuses to boot. We can't tamper with the kernel on disk any more &mdash; the boot chain will catch it.</p>
    <div class="slide-number">23</div>
  </div>
</body>
</html>
