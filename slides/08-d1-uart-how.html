<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared/style.css">
  <style>
    .waveform-wrap {
      background: var(--terminal-bg);
      border-radius: 12px;
      padding: 40px 48px 28px;
      width: 100%;
    }
    .waveform-wrap svg polyline {
      filter: drop-shadow(0 0 4px rgba(78, 201, 176, 0.35));
    }
  </style>
</head>
<body>
  <div class="slide" style="align-items: flex-start;">
    <div class="slide-label">UART</div>
    <h2 style="margin-bottom: 24px;">How it works.</h2>
    <p style="margin-bottom: 36px; font-size: 36px;">Two wires &mdash; TX and RX, cross-connected &mdash; at an agreed baud rate. No clock wire.</p>

    <div class="waveform-wrap">
      <svg viewBox="0 0 800 150" width="100%" style="display: block;">
        <!-- Voltage reference labels -->
        <text x="12" y="38" style="font-family: var(--font-mono); font-size: 14px; fill: #4ec9b0; opacity: 0.5;">HIGH</text>
        <text x="12" y="108" style="font-family: var(--font-mono); font-size: 14px; fill: #4ec9b0; opacity: 0.5;">LOW</text>

        <!-- Reference lines -->
        <line x1="50" y1="30" x2="720" y2="30" stroke="#4ec9b0" stroke-width="1" opacity="0.1" />
        <line x1="50" y1="100" x2="720" y2="100" stroke="#4ec9b0" stroke-width="1" opacity="0.1" />

        <!-- 8N1 label (most common UART configuration) -->
        <text x="788" y="18" style="font-family: var(--font-mono); font-size: 13px; fill: #d4d4d4; opacity: 0.4;" text-anchor="end">8N1</text>

        <!-- Waveform: byte 0xA5 (LSB-first: 1,0,1,0,0,1,0,1) -->
        <polyline
          points="50,30 110,30 110,100 165,100 165,30 220,30 220,100 275,100 275,30 330,30 330,100 440,100 440,30 495,30 495,100 550,100 550,30 720,30"
          fill="none" stroke="#4ec9b0" stroke-width="3" stroke-linejoin="miter"
        />

        <!-- Section labels -->
        <text x="80" y="138" style="font-family: var(--font-mono); font-size: 13px; fill: #d4d4d4; opacity: 0.6;" text-anchor="middle">IDLE</text>
        <text x="137" y="138" style="font-family: var(--font-mono); font-size: 13px; fill: #d4d4d4; opacity: 0.6;" text-anchor="middle">START</text>

        <!-- Data bits bracket -->
        <line x1="165" y1="120" x2="605" y2="120" stroke="#d4d4d4" stroke-width="1" opacity="0.25" />
        <line x1="165" y1="116" x2="165" y2="124" stroke="#d4d4d4" stroke-width="1" opacity="0.25" />
        <line x1="605" y1="116" x2="605" y2="124" stroke="#d4d4d4" stroke-width="1" opacity="0.25" />
        <text x="385" y="138" style="font-family: var(--font-mono); font-size: 13px; fill: #d4d4d4; opacity: 0.6;" text-anchor="middle">8 DATA BITS (LSB FIRST)</text>

        <text x="632" y="138" style="font-family: var(--font-mono); font-size: 13px; fill: #d4d4d4; opacity: 0.6;" text-anchor="middle">STOP</text>
        <text x="690" y="138" style="font-family: var(--font-mono); font-size: 13px; fill: #d4d4d4; opacity: 0.6;" text-anchor="middle">IDLE</text>
      </svg>
    </div>

    <div style="display: flex; gap: 40px; margin-top: 24px; font-size: 24px; color: var(--text-soft); line-height: 1.4;">
      <div><strong style="font-family: var(--font-mono); color: var(--text);">LSB</strong> &mdash; Least significant bit</div>
      <div><strong style="font-family: var(--font-mono); color: var(--text);">8N1</strong> &mdash; 8 data bits, no parity, 1 stop bit</div>
    </div>

    <div class="slide-number">08</div>
  </div>
</body>
</html>
