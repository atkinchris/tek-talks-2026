<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared/style.css">
  <style>
    .slide { padding: 0; position: relative; }
    img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
    .caption {
      position: absolute;
      bottom: 100px;
      left: 120px;
      color: white;
      font-size: 64px;
      font-weight: 700;
      max-width: 1100px;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <div class="slide">
    <img src="assets/toy.jpg" alt="A disassembled toy">
    <div class="caption">When I was a kid, I used to take things apart to see how they worked.</div>
    <div class="slide-number">01</div>
  </div>
</body>
</html>
