<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared/style.css">

<body>
  <div class="slide" style="align-items: flex-start;">
    <div class="slide-label">UART</div>
    <h2 style="margin-bottom: 48px;">A serial debug port,<br>left behind by the manufacturer.</h2>
    <div style="display: flex; gap: 40px; width: 100%;">
      <div class="box box-blue" style="flex: 1;">
        <h3 class="blue" style="margin-bottom: 16px;">What is it?</h3>
        <p>A simple serial communication protocol &mdash; two wires, one for sending, one for receiving.</p>
      </div>
      <div class="box" style="flex: 1;">
        <h3 style="margin-bottom: 16px;">Why is it there?</h3>
        <p>Manufacturers use it during development to debug devices. The pads are often left on production boards.</p>
      </div>
    </div>
    <div class="slide-number">07</div>
  </div>
</body>
