<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared/style.css">
</head>
<body>
  <div class="slide" style="align-items: flex-start;">
    <div class="slide-label">Reverse engineering</div>
    <h2 style="margin-bottom: 48px;">Code you can't read.</h2>
    <div style="display: flex; align-items: center; gap: 32px; width: 100%;">
      <div class="box box-blue" style="flex: 1; text-align: center;">
        <h3 class="blue">Source code</h3>
        <p style="margin-top: 12px; font-size: 30px;">What the developer wrote</p>
      </div>
      <div style="font-size: 56px; color: var(--text-soft);">&#8594;</div>
      <div class="box" style="flex: 1; text-align: center;">
        <h3>Compiled binary</h3>
        <p style="margin-top: 12px; font-size: 30px;">What ships on the device</p>
      </div>
      <div style="font-size: 56px; color: var(--text-soft);">&#8594;</div>
      <div class="box box-green" style="flex: 1; text-align: center;">
        <h3 class="green">Disassembly</h3>
        <p style="margin-top: 12px; font-size: 30px;">What Ghidra shows us</p>
      </div>
    </div>
    <p class="soft" style="margin-top: 48px; font-size: 36px;">We don't get the source back exactly &mdash; but we get enough to understand what the code is doing.</p>
    <div class="slide-number">12</div>
  </div>
</body>
</html>
