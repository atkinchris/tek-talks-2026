<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared/style.css">
</head>
<body>
  <div class="slide" style="align-items: flex-start;">
    <div class="slide-label">UART</div>
    <h2 style="margin-bottom: 48px;">How it works.</h2>
    <div style="display: flex; gap: 40px; width: 100%; align-items: stretch;">
      <div class="box" style="flex: 1;">
        <h3 style="margin-bottom: 16px;">Baud rate</h3>
        <p>Both sides agree on a speed (e.g. 115200 bits/sec). No clock wire needed.</p>
      </div>
      <div class="box box-blue" style="flex: 1;">
        <h3 class="blue" style="margin-bottom: 16px;">TX / RX</h3>
        <p>TX on the device connects to RX on your adapter, and vice versa.</p>
      </div>
      <div class="box" style="flex: 1;">
        <h3 style="margin-bottom: 16px;">Hardware</h3>
        <p>A cheap USB-to-serial adapter. Connect up, open a terminal, and listen.</p>
      </div>
    </div>
    <div class="slide-number">09</div>
  </div>
</body>
</html>
